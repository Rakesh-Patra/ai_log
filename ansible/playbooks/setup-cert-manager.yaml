---
# WHY THIS EXISTS:
# Infrastructure must be reproducible. Installing cert-manager manually means
# cluster rebuilds require tribal knowledge. Automating it via Ansible ensures
# disaster recovery is robust and deterministic.

- name: "Install cert-manager"
  hosts: k3s
  become: true
  tasks:
    - name: "Add jetstack Helm repository"
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io

    - name: "Install cert-manager via Helm"
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        namespace: cert-manager
        create_namespace: true
        values:
          crds:
            enabled: true
      register: cert_manager_install

    - name: "Wait for cert-manager-webhook to be ready"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: cert-manager-webhook
        namespace: cert-manager
      register: webhook_status
      until: >
        webhook_status.resources is defined and
        webhook_status.resources | length > 0 and
        webhook_status.resources[0].status.readyReplicas is defined and
        webhook_status.resources[0].status.readyReplicas > 0
      retries: 30
      delay: 10
