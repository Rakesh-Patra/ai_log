name: Build Agent

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - 'main'
    paths:
      - 'agent/**'
      - '.github/workflows/call-docker-build-agent.yaml'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'agent/**'
      - '.github/workflows/call-docker-build-agent.yaml'

jobs:
  docker-build:
    name: Agent Docker Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      security-events: write
      id-token: write   # Gap 1: Required for Cosign keyless signing via OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Security: Lint Dockerfile ───────────────────────────────
      - name: "📋 Lint Dockerfile (Hadolint)"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: agent/Dockerfile
          failure-threshold: warning

      # ── Security: Python dependency audit (SCA) ─────────────────
      - name: "🛡 Python dependency audit (pip-audit)"
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: agent/requirements.txt
          vulnerability-service: osv
        continue-on-error: true

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            patracoder/k8s-ai-agent
            ghcr.io/${{ github.repository_owner }}/examplevotingapp_agent
          tags: |
            type=raw,value=v1.0,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,event=pr

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security: CVE scan ──────────────────────────────────────
      - name: "🔍 Build local image for Trivy scan"
        run: docker build -t agent:scan ./agent

      - name: "🔍 Scan image for CVEs (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agent:scan
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          timeout: 10m

      # ── Gap 1 CLOSED: Cosign keyless image signing ──────────────
      - name: "🔏 Install Cosign"
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: "🔏 Sign images with Cosign (keyless OIDC)"
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            echo "Signing: $tag"
            cosign sign --yes "$tag@${{ steps.build.outputs.digest }}"
          done
