# ── Vault token (Isolated for Agent) ─────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: voting-agent
type: Opaque
stringData:
  token: "root"   # Replace with scoped agent token

# ── SecretStore: Agent-Specific Connection ────────────────────
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: voting-agent
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: voting-agent
          key: token

# ── ExternalSecret: AI Agent API keys (Isolated) ──────────────
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-secrets-sync
  namespace: voting-agent
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: agent-secrets
    creationPolicy: Owner
  data:
  - secretKey: GOOGLE_API_KEY
    remoteRef:
      key: agent-keys
      property: google_api_key
  - secretKey: LANGSMITH_API_KEY
    remoteRef:
      key: agent-keys
      property: langsmith_api_key
