repos:
  # ── Gitleaks: block secrets in every commit (DAY 2) ──────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: "🔒 Gitleaks — detect hardcoded secrets"

  # ── Terraform formatting & validation (DAY 3) ───────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        name: "🏗️ Terraform fmt"
      - id: terraform_validate
        name: "🏗️ Terraform validate"
        args: ['--hook-config=--retry-once-with-cleanup=true']

  # ── Standard code quality hooks ──────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: "✂️ Trailing whitespace"
      - id: end-of-file-fixer
        name: "📄 End of file fixer"
      - id: check-yaml
        name: "📋 YAML syntax check"
        args: ['--allow-multiple-documents']
      - id: check-merge-conflict
        name: "⚠️ Merge conflict markers"
      - id: check-added-large-files
        name: "📦 Block large files (>500KB)"
        args: ["--maxkb=500"]
      - id: detect-private-key
        name: "🔒 Detect private keys"

  # ── YAML lint (catch config errors early) ────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: "📋 Lint YAML files"
        args: ["-d", "{extends: relaxed, rules: {line-length: {max: 160}}}"]
        types: [yaml]
