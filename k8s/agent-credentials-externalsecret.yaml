# ════════════════════════════════════════════════════════════
# Agent Credentials — ExternalSecret (Kubernetes Auth)
#
# Uses the vault-backend SecretStore in the voting-agent namespace
# (defined in agent/k8s/external-secrets.yaml)
# ════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-credentials-sync
  namespace: voting-agent
  annotations:
    security.io/classification: "reference-only"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: agent-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
  - secretKey: GOOGLE_API_KEY
    remoteRef:
      key: agent-credentials
      property: api_key
