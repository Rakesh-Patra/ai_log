name: Build Agent
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - 'main'
    paths:
      - 'agent/**'
      - '.github/workflows/call-docker-build-agent.yaml'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'agent/**'
      - '.github/workflows/call-docker-build-agent.yaml'

jobs:
  call-docker-build:

    name: Agent Call Docker Build

    uses: dockersamples/.github/.github/workflows/reusable-docker-build.yaml@main

    permissions:
      contents: read
      packages: write
      pull-requests: write
    
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

    with:
      
      dockerhub-enable: true
      ghcr-enable: true

      image-names: |
        patracoder/k8s-ai-agent
        ghcr.io/${{ github.repository_owner }}/examplevotingapp_agent      

      tag-rules: |
        type=raw,value=v1.0,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
        type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
        type=ref,event=pr
      
      context: agent
      platforms: linux/amd64,linux/arm64
