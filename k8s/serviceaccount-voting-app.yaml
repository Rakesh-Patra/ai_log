# ════════════════════════════════════════════════════════════
# Section 2: RBAC — Role-Based Access Control
# Principle: least privilege for every ServiceAccount
#
# Apply: kubectl apply -f k8s/rbac.yaml
# Verify:
#   kubectl auth can-i list pods \
#     --as=system:serviceaccount:default:voting-app
#   kubectl auth can-i delete pods \
#     --as=system:serviceaccount:default:voting-app
# ════════════════════════════════════════════════════════════

# ── ServiceAccounts — one per component ──────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: voting-app
  namespace: default
  labels:
    app: voting-app
automountServiceAccountToken: false   # Security: disabled unless needed

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vote-sa
  namespace: default
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: result-sa
  namespace: default
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: default
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-sa
  namespace: default
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: default
automountServiceAccountToken: false

# ── Role: Read-only pod/service viewer (vote, result) ────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]

# ── Role: Worker — needs secret read for DB credentials ──────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["db-secret", "redis-secret"]  # Named — least privilege
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

# ── ClusterRole: AI Agent — read cluster state ───────────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-cluster-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "services", "endpoints", "namespaces", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]

# ── RoleBindings ──────────────────────────────────────────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vote-read-pods
  namespace: default
subjects:
- kind: ServiceAccount
  name: vote-sa
  namespace: default
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: result-read-pods
  namespace: default
subjects:
- kind: ServiceAccount
  name: result-sa
  namespace: default
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: worker-role-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: worker-sa
  namespace: default
roleRef:
  kind: Role
  name: worker-role
  apiGroup: rbac.authorization.k8s.io
