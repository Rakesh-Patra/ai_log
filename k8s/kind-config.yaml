---
# Stable Hardened kind cluster (v1.31.0)
# Port mappings: UI(5050), Agent(8001)
# Hardening: etcd encryption at rest

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    image: kindest/node:v1.31.0   # Stable version
    extraMounts:
      - hostPath: ./k8s/encryption-config.yaml
        containerPath: /etc/kubernetes/encryption-config.yaml
        readOnly: true
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            encryption-provider-config: /etc/kubernetes/encryption-config.yaml
          extraVolumes:
            - name: encryption-config
              hostPath: /etc/kubernetes/encryption-config.yaml
              mountPath: /etc/kubernetes/encryption-config.yaml
              readOnly: true
              pathType: File
    extraPortMappings:
      - containerPort: 80
        hostPort: 5050
        protocol: TCP
      - containerPort: 8000
        hostPort: 8001
        protocol: TCP

  - role: worker
    image: kindest/node:v1.31.0

  - role: worker
    image: kindest/node:v1.31.0
