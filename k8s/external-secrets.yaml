# ════════════════════════════════════════════════════════════
# Section 6: External Secrets Operator — Git-Safe Secret Management
#
# Flow: HashiCorp Vault → ESO → Kubernetes Secret → Pod env vars
# Git only stores this file (references, NOT values).
#
# Install ESO:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# Apply: kubectl apply -f k8s/external-secrets.yaml
# Verify: kubectl get externalsecret -n default
# ════════════════════════════════════════════════════════════

# ── Vault token (bootstrap secret — rotated after setup) ─────
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: default
  annotations:
    # Reminder: rotate this token! Use AppRole or K8s auth in production.
    security.io/rotate-after: "setup-complete"
type: Opaque
stringData:
  token: "root"   # Replace with a scoped Vault token — NEVER use root in prod

# ── SecretStore: Connection to HashiCorp Vault ────────────────
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.default.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: default
          key: token

# ── ExternalSecret: DB credentials (git-safe) ────────────────
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials-sync
  namespace: default
  annotations:
    # This file is GIT-SAFE — it references secrets, never stores them
    security.io/classification: "reference-only"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: db-secret          # Creates a native K8s Secret with this name
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_USER
    remoteRef:
      key: db-credentials
      property: username
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: db-credentials
      property: password
  - secretKey: POSTGRES_HOST
    remoteRef:
      key: db-credentials
      property: host

# ── ExternalSecret: Redis credentials (git-safe) ─────────────
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials-sync
  namespace: default
  annotations:
    security.io/classification: "reference-only"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: redis-secret
    creationPolicy: Owner
  data:
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: redis-credentials
      property: password
  - secretKey: REDIS_HOST
    remoteRef:
      key: redis-credentials
      property: host
  - secretKey: REDIS_PORT
    remoteRef:
      key: redis-credentials
      property: port
