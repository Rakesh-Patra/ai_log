# Copy this file to db-secret.yaml and fill in real base64-encoded values.
# NEVER commit db-secret.yaml — it is gitignored.
#
# Encode a value:  echo -n 'YOUR_VALUE' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
data:
  username: <BASE64_ENCODED_USERNAME>
  password: <BASE64_ENCODED_PASSWORD>
