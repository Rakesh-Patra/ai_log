name: 🛡️ Security Checks (Zero-to-Hero)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────
  # 1. Secret Scanning — Gitleaks
  # ─────────────────────────────────────────────────
  secret-scan:
    name: "🕵️ Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: "🕵️ Run Gitleaks"
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────
  # 2. Kubernetes Manifest Security & Best Practices
  # ─────────────────────────────────────────────────
  k8s-manifests:
    name: "⛵ K8s Linter (KubeLinter)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "⛵ Run KubeLinter"
        uses: stackrox/kube-linter-action@8ed7cc3d116f647da9eb4b5e179a436b9313cab7  # v1 (main)
        with:
          directory: k8s/
          config: .kube-linter.yaml

  # ─────────────────────────────────────────────────
  # 3. YAML Syntax & Formatting
  # ─────────────────────────────────────────────────
  k8s-lint:
    name: "📝 YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "📝 Run yamllint"
        uses: ibiqlik/action-yamllint@ae1abb2821b567e96742aa776f7b62c9b6a26bc8  # v3
        with:
          config_file: .yamllint.yaml

  # ─────────────────────────────────────────────────
  # 4. Dockerfile Security
  # ─────────────────────────────────────────────────
  dockerfile-check:
    name: "🐳 Dockerfile Scan (Hadolint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "🐳 Run Hadolint"
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: result/Dockerfile

  # ─────────────────────────────────────────────────
  # 5. Infrastructure as Code Scan (Checkov)
  # ─────────────────────────────────────────────────
  iac-scan:
    name: "🏗️ IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "🏗️ Checkov scan — Kubernetes"
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true
          output_format: cli
          skip_check: CKV_K8S_43  # Image digest pinning skipped for simpler CI caching
      - name: "🏗️ Checkov scan — Terraform"
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli

  # ─────────────────────────────────────────────────
  # 6. SAST Scan (Semgrep)
  # ─────────────────────────────────────────────────
  sast-scan:
    name: "🔬 SAST Scan (Semgrep)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "🔬 Run Semgrep"
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: auto

  # ─────────────────────────────────────────────────
  # 7. Container Vulnerability Scan (Trivy)
  # ─────────────────────────────────────────────────
  container-scan:
    name: "🛡️ Container Scan (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "🐳 Build Docker image"
        run: docker build -t ai-log:${{ github.sha }} -f result/Dockerfile .
      - name: "🛡️ Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # master
        with:
          image-ref: ai-log:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
