apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: kubernetes-dashboard
---
# Use 'view' role instead of 'cluster-admin' to follow least-privilege principle.
# This grants read-only access to most resources — sufficient for a dashboard.
# Change to 'edit' if you need to modify resources from the dashboard.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: admin-user
  namespace: kubernetes-dashboard
