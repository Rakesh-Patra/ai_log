# WHY THIS EXISTS:
# Static resource limits go stale. VPA recommendation mode gives you
# data-driven right-sizing without the risk of VPA changing limits in prod.
# You set limits once, and six months later the app has grown 3x and pods
# are throttled. VPA tells you exactly what limits to set.

apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vote-vpa
  namespace: default
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vote
  updatePolicy:
    updateMode: "Off"   # "Off" = recommendations only, no auto-update
