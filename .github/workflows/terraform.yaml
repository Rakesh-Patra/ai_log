name: "Terraform Infrastructure"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  TF_WORKING_DIR: "agent/terraform"
  VAULT_ADDR: "http://13.232.226.25:30200"

jobs:
  checkov-scan:
    name: "🏗️ Checkov IaC Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "🏗️ Run Checkov on Terraform"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: agent/terraform/
          framework: terraform
          soft_fail: true

  terraform:
    name: "🏗️ Terraform ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'Apply' || 'Plan' }}"
    runs-on: ubuntu-latest
    needs: checkov-scan
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: "🔑 Fetch AWS Credentials from Vault (direct JWT)"
        id: vault
        run: |
          # 1. Get GitHub OIDC token
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/Rakesh-Patra" | jq -r '.value')

          # 2. Login to Vault via JWT
          LOGIN_RESPONSE=$(curl -sS -X POST "$VAULT_ADDR/v1/auth/jwt/login" \
            -d "{\"role\":\"gh-actions-role\",\"jwt\":\"$OIDC_TOKEN\"}")
          
          VAULT_TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.auth.client_token')
          if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
            echo "❌ Vault login failed:"
            echo "$LOGIN_RESPONSE" | jq .
            exit 1
          fi
          echo "✅ Vault login successful"

          # 3. Fetch AWS dynamic credentials
          CREDS=$(curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/aws/creds/terraform-role")
          
          AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r '.data.access_key')
          AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r '.data.secret_key')

          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ "$AWS_ACCESS_KEY_ID" = "null" ]; then
            echo "❌ Failed to fetch AWS credentials:"
            echo "$CREDS" | jq .
            exit 1
          fi
          echo "✅ AWS credentials fetched"

          # 4. Export to GitHub Actions environment
          echo "VAULT_TOKEN=$VAULT_TOKEN" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV

          # Mask secrets in logs
          echo "::add-mask::$VAULT_TOKEN"
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
        working-directory: .
      - name: "⏳ Wait for AWS Credential Propagation"
        run: |
          echo "Waiting for dynamic IAM user to propagate..."
          sleep 10
          aws sts get-caller-identity
      - name: Terraform Init
        run: terraform init -input=false
      - name: Terraform Plan
        run: terraform plan -input=false -var="vault_address=${{ env.VAULT_ADDR }}"
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -var="vault_address=${{ env.VAULT_ADDR }}"

