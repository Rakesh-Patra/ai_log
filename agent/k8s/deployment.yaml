apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-agent
  namespace: voting-agent
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      serviceAccountName: ai-sre-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent
        image: patracoder/k8s-ai-agent:v1.0
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-secrets
              key: GOOGLE_API_KEY
        - name: PROMETHEUS_URL
          value: "http://kind-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090"
        - name: RISK_THRESHOLD
          value: "30"
        - name: APP_ENV
          value: "prod"
        - name: KUBECONFIG_PATH
          value: "" # Empty tells the SDK to use in-cluster config
        resources:
          requests:
            cpu: 200m     # Upped from 100m for better AI performance
            memory: 256Mi
          limits:
            cpu: 1000m    # Upped from 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false   # Agent needs to write to its local db/logs
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15

