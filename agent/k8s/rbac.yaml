apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-sre-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-sre-role
rules:
- apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io"]
  resources: ["pods", "pods/log", "nodes", "services", "deployments", "statefulsets", "daemonsets", "replicasets", "jobs", "cronjobs", "namespaces", "configmaps", "secrets", "events", "ingresses"]
  verbs: ["get", "list", "watch", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-sre-binding
subjects:
- kind: ServiceAccount
  name: ai-sre-agent
  namespace: default
roleRef:
  kind: ClusterRole
  name: ai-sre-role
  apiGroup: rbac.authorization.k8s.io
