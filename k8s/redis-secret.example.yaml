# Copy this file to redis-secret.yaml and fill in a real base64-encoded password.
# NEVER commit redis-secret.yaml — it is gitignored.
#
# Encode a value:  echo -n 'YOUR_REDIS_PASSWORD' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
type: Opaque
data:
  password: <BASE64_ENCODED_PASSWORD>
