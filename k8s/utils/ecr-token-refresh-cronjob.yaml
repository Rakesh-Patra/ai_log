# WHY THIS EXISTS:
# ECR tokens expire every 12 hours. ImagePullBackOff at 2am
# because your pull secret expired is a completely avoidable incident.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: kube-system
spec:
  schedule: "0 */6 * * *" # Every 6 hours
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: ecr-refresh
            image: amazon/aws-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
              kubectl delete secret ecr-secret -n default --ignore-not-found
              kubectl create secret docker-registry ecr-secret -n default \
                --docker-server=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com \
                --docker-username=AWS \
                --docker-password=$TOKEN
            env:
            - name: AWS_REGION
              value: "ap-south-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
          restartPolicy: OnFailure
