name: "\U0001F512 Gitleaks Secret Scan"

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    name: "\U0001F512 Gitleaks — full history & diff scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for history scanning

      - name: "\U0001F512 Run Gitleaks (custom project rules)"
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --config custom-rules.toml --source . --log-opts="HEAD~1..HEAD"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false
