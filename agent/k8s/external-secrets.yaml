# ════════════════════════════════════════════════════════════
# External Secrets — Vault Kubernetes Auth (no static tokens)
#
# Prerequisites:
#   1. Vault must have Kubernetes auth enabled:
#        vault auth enable kubernetes
#        vault write auth/kubernetes/config \
#          kubernetes_host="https://kubernetes.default.svc:443"
#
#   2. Create Vault role for the agent service account:
#        vault write auth/kubernetes/role/agent-role \
#          bound_service_account_names=ai-sre-agent \
#          bound_service_account_namespaces=voting-agent \
#          policies=agent-read-policy \
#          ttl=1h
#
#   3. Create the read policy:
#        vault policy write agent-read-policy - <<EOF
#        path "secret/data/agent-keys" {
#          capabilities = ["read"]
#        }
#        path "secret/data/agent-credentials" {
#          capabilities = ["read"]
#        }
#        EOF
#
# TLS: Uses https:// — mount Vault CA cert as a ConfigMap
#   kubectl create configmap vault-ca-cert \
#     --from-file=ca.crt=/path/to/vault-ca.pem -n voting-agent
# ════════════════════════════════════════════════════════════

# ── SecretStore: Kubernetes Auth (no static token) ───────────
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: voting-agent
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      # TLS: trust Vault's CA certificate
      caProvider:
        type: ConfigMap
        name: vault-ca-cert
        namespace: voting-agent
        key: ca.crt
      auth:
        # Kubernetes auth — uses the pod's service account token
        # No static vault-token secret needed!
        kubernetes:
          mountPath: "kubernetes"
          role: "agent-role"
          serviceAccountRef:
            name: ai-sre-agent

# ── ExternalSecret: AI Agent API keys (Isolated) ──────────────
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-secrets-sync
  namespace: voting-agent
  annotations:
    security.io/classification: "reference-only"
spec:
  refreshInterval: 1h       # Reduced from 24h for faster secret rotation
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: agent-secrets
    creationPolicy: Owner
    deletionPolicy: Delete   # Clean up when ExternalSecret is deleted
  data:
  - secretKey: GOOGLE_API_KEY
    remoteRef:
      key: agent-keys
      property: google_api_key
  - secretKey: LANGSMITH_API_KEY
    remoteRef:
      key: agent-keys
      property: langsmith_api_key
