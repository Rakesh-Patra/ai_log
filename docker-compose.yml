# version is now using "compose spec"
# v2 and v3 are now combined!
# docker-compose v1.27+ required

services:
  vote:
    build:
      context: ./vote
      target: dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./vote:/usr/local/app
    ports:
      - "5000:80"
    networks:
      - front-tier
      - back-tier

  result:
    build: ./result
    # use nodemon rather than node for local dev
    entrypoint: nodemon --inspect=0.0.0.0 server.js
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./result:/usr/local/app
    ports:
      - "5001:80"
      - "127.0.0.1:9229:9229"
    networks:
      - front-tier
      - back-tier

  worker:
    build:
      context: ./worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - back-tier

  redis:
    image: redis:alpine
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: "5s"
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: "5s"
    networks:
      - back-tier

  # this service runs once to seed the database with votes
  # it won't run unless you specify the "seed" profile
  # docker compose --profile seed up -d
  seed:
    build: ./seed-data
    profiles: [ "seed" ]
    depends_on:
      vote:
        condition: service_healthy
    networks:
      - front-tier
    restart: "no"

  agent:
    build:
      context: ./agent
    env_file:
      - ./agent/.env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      # Override host/WSL paths from .env; file must use host.docker.internal for Kind API from inside the container.
      - KUBECONFIG=/app/kubeconfig_agent
      - KUBECONFIG_PATH=/app/kubeconfig_agent
      - MODEL_NAME=gemini-2.5-flash-lite
    volumes:
      - ./agent:/app
    ports:
      - "8000:8000"
    depends_on:
      - temporal
    networks:
      - front-tier
      - back-tier

  agent-worker:
    build:
      context: ./agent
    env_file:
      - ./agent/.env
    command: [ "python", "-m", "app.temporal.worker" ]
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - KUBECONFIG=/app/kubeconfig_agent
      - KUBECONFIG_PATH=/app/kubeconfig_agent
      - MODEL_NAME=gemini-2.5-flash-lite
    volumes:
      - ./agent:/app
    depends_on:
      - temporal
    networks:
      - back-tier

  temporal:
    image: temporalio/auto-setup:1.22.4
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - back-tier

  temporal-ui:
    image: temporalio/ui:2.21.3
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - back-tier

volumes:
  db-data:


networks:
  front-tier:
  back-tier:
