# ════════════════════════════════════════════════════════════
# Section 6: External Secrets Operator — Git-Safe Secret Management
#
# Flow: HashiCorp Vault → ESO → Kubernetes Secret → Pod env vars
# Git only stores this file (references, NOT values).
#
# Auth: Kubernetes ServiceAccount auth (zero static tokens)
# TLS:  Vault must be configured with TLS certificates
#
# Prerequisites:
#   1. Install ESO:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#
#   2. Enable Vault Kubernetes auth:
#        vault auth enable kubernetes
#        vault write auth/kubernetes/config \
#          kubernetes_host="https://kubernetes.default.svc:443"
#
#   3. Create Vault roles (one per namespace):
#        vault write auth/kubernetes/role/default-app-role \
#          bound_service_account_names=voting-app \
#          bound_service_account_namespaces=default \
#          policies=app-read-policy \
#          ttl=1h
#
#   4. Mount Vault CA certificate:
#        kubectl create configmap vault-ca-cert \
#          --from-file=ca.crt=/path/to/vault-ca.pem -n default
#
# Apply: kubectl apply -f k8s/external-secrets.yaml
# Verify: kubectl get externalsecret -n default
# ════════════════════════════════════════════════════════════

# ── SecretStore: Kubernetes Auth + TLS to Vault ───────────────
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.default.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        # Kubernetes auth — uses pod's ServiceAccount token
        # Eliminates the need for a static vault-token Secret
        kubernetes:
          mountPath: "kubernetes"
          role: "default-app-role"
          serviceAccountRef:
            name: voting-app

# ── ExternalSecret: DB credentials (git-safe) ────────────────
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials-sync
  namespace: default
  annotations:
    # This file is GIT-SAFE — it references secrets, never stores them
    security.io/classification: "reference-only"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: db-secret          # Creates a native K8s Secret with this name
    creationPolicy: Owner
    deletionPolicy: Delete   # Clean up when ExternalSecret is deleted
  data:
  - secretKey: POSTGRES_USER
    remoteRef:
      key: db-credentials
      property: username
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: db-credentials
      property: password
  - secretKey: POSTGRES_HOST
    remoteRef:
      key: db-credentials
      property: host

# ── ExternalSecret: Redis credentials (git-safe) ─────────────
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials-sync
  namespace: default
  annotations:
    security.io/classification: "reference-only"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: redis-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: redis-credentials
      property: password
  - secretKey: REDIS_HOST
    remoteRef:
      key: redis-credentials
      property: host
  - secretKey: REDIS_PORT
    remoteRef:
      key: redis-credentials
      property: port
