# -----------------------------------------------------------------------------
# Agent Credentials - ExternalSecret (Kubernetes Auth)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-credentials-sync
  namespace: voting-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: agent-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
  - secretKey: GOOGLE_API_KEY
    remoteRef:
      key: agent
      property: GOOGLE_API_KEY
  - secretKey: MODEL_NAME
    remoteRef:
      key: agent
      property: MODEL_NAME
  - secretKey: POSTGRES_USER
    remoteRef:
      key: agent
      property: POSTGRES_USER
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: agent
      property: POSTGRES_PASSWORD
  - secretKey: LANGCHAIN_API_KEY
    remoteRef:
      key: agent
      property: LANGCHAIN_API_KEY
