apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 8200
    protocol: TCP
    targetPort: 8200
    nodePort: 8200
    name: http
  - port: 8201
    protocol: TCP
    targetPort: 8201
    nodePort: 8201
    name: https-internal
  selector:
    app.kubernetes.io/instance: vault
    app.kubernetes.io/name: vault
    component: server
