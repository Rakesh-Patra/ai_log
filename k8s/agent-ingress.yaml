apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: agent-strip-prefix
  namespace: voting-agent
spec:
  stripPrefix:
    prefixes:
      - /agent

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress
  namespace: voting-agent
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/router.middlewares: voting-agent-agent-strip-prefix@kubernetescrd
spec:
  rules:
  - http:
      paths:
      - path: /agent
        pathType: Prefix
        backend:
          service:
            name: agent
            port:
              number: 8000
