apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Resource ordering: namespaces first, then workloads ───────
resources:
  # Infrastructure / namespaces
  - namespaces.yaml
  - serviceaccount-voting-app.yaml

  # Networking (zero-trust policies)
  - networkpolicies.yaml

  # Vault TLS CA (must exist before SecretStore)
  - vault-ca-configmap.yaml

  # External Secrets (requires ESO CRDs installed)
  # NOTE: agent.yaml already includes the agent ExternalSecret,
  #       so agent-credentials-externalsecret.yaml is NOT listed here
  #       to avoid duplicate-resource errors.
  - external-secrets.yaml

  # AI Agent (ServiceAccount, RBAC, ExternalSecret, Deployment, Service)
  - agent.yaml

  # App workloads
  - ingress.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - vote-deployment.yaml
  - vote-service.yaml
  - result-deployment.yaml
  - result-service.yaml
  - worker-deployment.yaml
  - deployment-db.yaml
  - db-service.yaml
  - pvc-db.yaml

  # Autoscaling & availability
  - hpa-pdb.yaml

  # Kyverno admission policies
  - kyverno-policies.yaml
