---
# vault/tasks/main.yaml — Install HashiCorp Vault (idempotent)

- name: "Check if Vault is already installed"
  ansible.builtin.stat:
    path: /usr/bin/vault
  register: vault_binary

- name: "Add HashiCorp GPG key"
  ansible.builtin.apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present
  when: not vault_binary.stat.exists

- name: "Add HashiCorp apt repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
  when: not vault_binary.stat.exists

- name: "Install Vault"
  ansible.builtin.apt:
    name: "vault={{ vault_version }}-1"
    state: present
    update_cache: true
  when: not vault_binary.stat.exists

- name: "Create Vault data directory"
  ansible.builtin.file:
    path: "{{ vault_data_dir }}"
    state: directory
    owner: vault
    group: vault
    mode: '0700'

- name: "Configure Vault"
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: vault
    group: vault
    mode: '0640'
  notify: restart vault

- name: "Enable and start Vault service"
  ansible.builtin.systemd:
    name: vault
    enabled: true
    state: started
    daemon_reload: true

- name: "Wait for Vault to be reachable"
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 472, 473, 501, 503]
  register: vault_health
  retries: 15
  delay: 2
  until: vault_health.status is defined

- name: "Set VAULT_ADDR in profile"
  ansible.builtin.lineinfile:
    path: /home/ubuntu/.bashrc
    line: "export VAULT_ADDR={{ vault_addr }}"
    state: present
