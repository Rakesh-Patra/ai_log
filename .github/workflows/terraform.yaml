name: "Terraform Infrastructure"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  TF_WORKING_DIR: "agent/terraform"
  VAULT_ADDR: "http://13.232.226.25:30200"

jobs:
  checkov-scan:
    name: "🏗️ Checkov IaC Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "🏗️ Run Checkov on Terraform"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: agent/terraform/
          framework: terraform
          soft_fail: true

  terraform:
    name: "🏗️ Terraform ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'Apply' || 'Plan' }}"
    runs-on: ubuntu-latest
    needs: checkov-scan
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: "🔍 Debug — Inspect OIDC Token & Vault Role"
        run: |
          echo "=== Fetching GitHub OIDC token with audience ==="
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/Rakesh-Patra" | jq -r '.value')
          
          echo "=== Decoding JWT payload (audience claim) ==="
          echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{aud, iss, sub}' || echo "Failed to decode"
          
          echo ""
          echo "=== Checking Vault JWT role config (unauthenticated — may 403) ==="
          curl -sS http://13.232.226.25:30200/v1/auth/jwt/role/gh-actions-role 2>&1 | head -5 || true
          
          echo ""
          echo "=== Vault auth methods ==="
          curl -sS http://13.232.226.25:30200/v1/sys/auth 2>&1 | head -5 || true
          
          echo ""
          echo "=== Attempting manual JWT login for diagnostics ==="
          RESULT=$(curl -sS -X POST http://13.232.226.25:30200/v1/auth/jwt/login \
            -d "{\"role\":\"gh-actions-role\",\"jwt\":\"$OIDC_TOKEN\"}" 2>&1)
          echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"
        working-directory: .
      - name: "🔑 Fetch AWS Credentials from Vault"
        uses: hashicorp/vault-action@v2.5.0
        id: vault
        with:
          url: ${{ env.VAULT_ADDR }}
          role: gh-actions-role
          method: jwt
          jwtGithubAudience: "https://github.com/Rakesh-Patra"
          exportToken: false
          secrets: |
            aws/creds/terraform-role access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-role secret_key | AWS_SECRET_ACCESS_KEY
      - name: "⏳ Wait for AWS Credential Propagation"
        env:
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        run: |
          echo "Waiting for dynamic IAM user to propagate..."
          sleep 10
          aws sts get-caller-identity
      - name: Terraform Init
        env:
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        run: terraform init -input=false
      - name: Terraform Plan
        env:
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        run: terraform plan -input=false -var="vault_address=${{ env.VAULT_ADDR }}"
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        run: terraform apply -auto-approve -input=false -var="vault_address=${{ env.VAULT_ADDR }}"
