name: "Terraform Infrastructure"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  TF_WORKING_DIR: "agent/terraform"
  VAULT_ADDR: "http://13.232.226.25:30200"

jobs:
  checkov-scan:
    name: "🏗️ Checkov IaC Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "🏗️ Run Checkov on Terraform"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: agent/terraform/
          framework: terraform
          soft_fail: true

  terraform:
    name: "🏗️ Terraform ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'Apply' || 'Plan' }}"
    runs-on: ubuntu-latest
    needs: checkov-scan
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: "🔑 Fetch AWS Credentials from Vault"
        uses: hashicorp/vault-action@v3
        id: vault
        with:
          url: ${{ env.VAULT_ADDR }}
          role: gh-actions-role
          method: jwt
          jwtGithubAudience: "https://github.com/Rakesh-Patra"
          secrets: |
            aws/creds/terraform-role access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-role secret_key | AWS_SECRET_ACCESS_KEY
      - name: "⏳ Wait for AWS Credential Propagation"
        run: |
          echo "Waiting for dynamic IAM user to propagate..."
          sleep 10
          aws sts get-caller-identity
      - name: Terraform Init
        run: terraform init -input=false
      - name: Terraform Plan
        run: terraform plan -input=false -var="vault_address=${{ env.VAULT_ADDR }}"
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -var="vault_address=${{ env.VAULT_ADDR }}"
