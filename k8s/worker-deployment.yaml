apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "app-role"
        vault.hashicorp.com/agent-inject-secret-db-credentials: "secret/data/db-credentials"
        vault.hashicorp.com/agent-inject-template-db-credentials: |
          {{- with secret "secret/data/db-credentials" -}}
          export POSTGRES_USER="{{ .Data.data.username }}"
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          {{- end -}}
    spec:
      serviceAccountName: voting-app
      containers:
      - image: dockersamples/examplevotingapp_worker:latest
        name: worker
        command: ["/bin/sh", "-c"]
        args: [". /vault/secrets/db-credentials && dotnet Worker.dll"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false