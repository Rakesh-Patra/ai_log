# ════════════════════════════════════════════════════════════
# ingress.yaml — Public Access via K3s Traefik
# ════════════════════════════════════════════════════════════

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/router.middlewares: default-result-strip-prefix@kubernetescrd
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vote
            port:
              number: 5000
      - path: /result
        pathType: Prefix
        backend:
          service:
            name: result
            port:
              number: 5001
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: result
            port:
              number: 5001
      - path: /stylesheets
        pathType: Prefix
        backend:
          service:
            name: result
            port:
              number: 5001
      - path: /js
        pathType: Prefix
        backend:
          service:
            name: result
            port:
              number: 5001
      - path: /angular.min.js
        pathType: Exact
        backend:
          service:
            name: result
            port:
              number: 5001
      - path: /app.js
        pathType: Exact
        backend:
          service:
            name: result
            port:
              number: 5001
      - path: /socket.io.js
        pathType: Exact
        backend:
          service:
            name: result
            port:
              number: 5001
